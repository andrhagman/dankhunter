name: Update tracked game data

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update release data from IGDB
        env:
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: npm run update:releases

      - name: Update season calendar sources
        run: npm run update:seasons

      - name: Build
        run: npm run build

      - name: Commit tracked game data
        id: changes
        run: |
          if git diff --quiet -- src/data/pc-releases.json src/data/season-calendar.json; then
            echo "No release or season data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/pc-releases.json src/data/season-calendar.json
          git commit -m "Update tracked game data"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Setup Pages
        if: steps.changes.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
